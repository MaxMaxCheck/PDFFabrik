services:
  api:
    container_name: pdffabrik-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    # Coolify/Prod: kein Host-Port — API nur im Docker-Netz (Web: PDF_TOOL_API_URL=http://api:3001).
    expose:
      - "3001"
    environment:
      REDIS_URL: "${REDIS_URL}"
      JOBS_DIR: /data/jobs
      RQ_QUEUE_NAME: "${RQ_QUEUE_NAME:-pdf_jobs}"
      PDF_INTERNAL_SERVICE_TOKEN: "${PDF_INTERNAL_SERVICE_TOKEN}"
      OMP_NUM_THREADS: "8"
      TOKENIZERS_PARALLELISM: "false"
    volumes:
      - api-jobs:/data/jobs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3001/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  worker:
    # Kein container_name — sonst keine Replikas (Coolify/Docker Compose --scale).
    # 32 GB / 16 Kerne: 4 parallele PDF-Jobs (Analyse + Anonymize, pdf-redact & -json).
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    deploy:
      replicas: ${WORKER_REPLICAS:-4}
    command:
      - sh
      - -c
      - 'exec rq worker -u "$$REDIS_URL" "$$RQ_QUEUE_NAME"'
    environment:
      REDIS_URL: "${REDIS_URL}"
      RQ_QUEUE_NAME: "${RQ_QUEUE_NAME:-pdf_jobs}"
      JOBS_DIR: /data/jobs
      PYTHONPATH: /app
      OMP_NUM_THREADS: "${OMP_NUM_THREADS:-4}"
      TOKENIZERS_PARALLELISM: "false"
      PII_PRESIDIO_MAX_WORKERS: "${PII_PRESIDIO_MAX_WORKERS:-6}"
    volumes:
      - api-jobs:/data/jobs
    shm_size: 1gb

volumes:
  api-jobs: null
